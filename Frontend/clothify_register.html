<body class="bg-background text-on-surface flex flex-col min-h-screen">
<!-- Top Navigation Bar (Suppressed Shell because Transactional Focus, but referencing JSON Brand) -->
<header class="w-full top-0 sticky bg-surface border-b border-outline-variant/10 z-50">
<div class="flex items-center justify-between px-margin-mobile md:px-margin-desktop py-base max-w-container-max mx-auto">
<div class="flex items-center gap-base">
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:opacity-80 transition-opacity" data-icon="arrow_back">arrow_back</span>
<span class="font-display-lg text-[32px] md:text-display-lg tracking-tight text-on-surface">Clothify</span>
</div>
<div class="hidden md:flex gap-gutter">
<a class="text-on-surface-variant font-label-md text-label-md hover:opacity-80 transition-opacity" href="#">Help</a>
</div>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-margin-mobile py-stack-xl relative overflow-hidden">
<!-- Subtle Ambient Background Element -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-secondary-container/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="w-full max-w-[520px] bg-white border border-outline-variant/15 p-stack-md md:p-stack-xl relative z-10 shadow-[0_20px_40px_rgba(0,0,0,0.04)]">
<section class="mb-stack-md text-center">
<h1 class="font-headline-md text-headline-md text-on-surface mb-base">Join the Network</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[360px] mx-auto">Experience professional excellence with our refined business ecosystem.</p>
</section>
<form action="#" class="space-y-stack-sm" method="POST">
<!-- Username -->
<div class="space-y-base">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase tracking-widest" for="username">Username</label>
<input class="w-full px-4 py-3 bg-transparent border border-outline-variant/40 focus:border-secondary outline-none transition-colors font-body-md text-body-md placeholder:text-outline-variant/60 rounded-none" id="username" name="username" placeholder="johndoe_pro" type="text"/>
</div>
<!-- Email -->
<div class="space-y-base">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase tracking-widest" for="email">Email</label>
<input class="w-full px-4 py-3 bg-transparent border border-outline-variant/40 focus:border-secondary outline-none transition-colors font-body-md text-body-md placeholder:text-outline-variant/60 rounded-none" id="email" name="email" placeholder="name@corporate.com" type="email"/>
</div>
<!-- Contact -->
<div class="space-y-base">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase tracking-widest" for="contact">Contact</label>
<input class="w-full px-4 py-3 bg-transparent border border-outline-variant/40 focus:border-secondary outline-none transition-colors font-body-md text-body-md placeholder:text-outline-variant/60 rounded-none" id="contact" name="contact" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<!-- Password -->
<div class="space-y-base">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase tracking-widest" for="password">Password</label>
<div class="relative flex items-center">
<input class="w-full px-4 py-3 bg-transparent border border-outline-variant/40 focus:border-secondary outline-none transition-colors font-body-md text-body-md placeholder:text-outline-variant/60 rounded-none pr-12" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-on-surface-variant hover:text-secondary transition-colors cursor-pointer" id="togglePassword" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Seller Checkbox -->
<div class="flex items-start gap-3 py-base">
<div class="flex items-center h-5">
<input class="w-4 h-4 text-secondary border-outline-variant rounded-none focus:ring-0 focus:ring-offset-0" id="seller" name="seller" type="checkbox"/>
</div>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer select-none" for="seller">
                        I want to register as a service provider (Seller)
                    </label>
</div>
<!-- Primary CTA -->
<button class="w-full bg-[#001b3d] text-white font-label-md text-label-md uppercase tracking-widest py-4 mt-base hover:bg-secondary transition-all active:scale-[0.98]" type="submit">
                    CREATE ACCOUNT
                </button>
<!-- Social Divider -->
<div class="relative py-stack-sm flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/10"></div>
</div>
<span class="relative bg-white px-4 font-label-md text-[10px] text-on-surface-variant/60 tracking-widest">OR SIGN UP WITH</span>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-gutter">
<button class="flex items-center justify-center gap-2 border border-outline-variant/20 py-3 font-label-md text-label-md hover:bg-surface transition-colors rounded-none" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        GOOGLE
                    </button>
<button class="flex items-center justify-center gap-2 border border-outline-variant/20 py-3 font-label-md text-label-md hover:bg-surface transition-colors rounded-none" type="button">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.78.83-.04 2.13-.88 3.55-.74 1.48.15 2.58.74 3.24 1.76-3.02 1.77-2.54 6.13.43 7.37-.58 1.47-1.35 2.93-2.3 3.8zM12.03 7.25c-.02-2.3 1.94-4.32 4.13-4.25.21 2.45-2.34 4.45-4.13 4.25z"></path>
</svg>
                        APPLE
                    </button>
</div>
</form>
<div class="mt-stack-md text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Already have an account? 
                    <a class="text-secondary font-semibold hover:underline ml-1 transition-all" href="#">Log In</a>
</p>
</div>
</div>
</main>
<!-- Footer (Using JSON Structure) -->
<footer class="w-full py-stack-md border-t border-outline-variant/10 bg-background">
<div class="flex flex-col md:flex-row justify-between items-center px-margin-mobile md:px-margin-desktop gap-base max-w-container-max mx-auto">
<span class="font-label-md text-label-md text-on-surface-variant/60">© 2024 Clothify. All rights reserved.</span>
<div class="flex gap-gutter mt-4 md:mt-0">
<a class="text-on-surface-variant font-label-md text-label-md hover:text-primary transition-colors cursor-pointer" href="#">Help</a>
<a class="text-on-surface-variant font-label-md text-label-md hover:text-primary transition-colors cursor-pointer" href="#">Login</a>
</div>
</div>
</footer>
<script>
        // Password Visibility Toggle
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');
        
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            const icon = this.querySelector('span');
            icon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
            icon.setAttribute('data-icon', type === 'password' ? 'visibility' : 'visibility_off');
        });

        // Simple Form Interactivity
        const form = document.querySelector('form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.textContent = 'PROCESSING...';
            btn.disabled = true;
            btn.style.opacity = '0.7';
            
            setTimeout(() => {
                btn.textContent = originalText;
                btn.disabled = false;
                btn.style.opacity = '1';
                alert('Account registration initiated for ' + document.getElementById('username').value);
            }, 1500);
        });
    </script>
</body></html>
